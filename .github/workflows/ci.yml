name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Dry-run on temp project
        run: |
          mkdir -p /tmp/testproj/server/_core
          echo '{"dependencies": {"mysql2": "^3.0.0"}}' > /tmp/testproj/package.json
          echo 'export const env = { isProduction: false };' > /tmp/testproj/server/_core/env.ts
          manus-to-supabase /tmp/testproj
